{% extends "base.html" %}

{% block title %}Upload CSV | Mini ETL System{% endblock %}

{% block content %}
<div class="glass-panel">
    <h1>Mini ETL System</h1>
    <h2>Upload your raw data to begin processing</h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="upload-area">
            <svg style="width:48px;height:48px;color:var(--text-muted);margin-bottom:1rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
            </svg>
            <input type="file" name="csvfile" required accept=".csv">
            <p style="color:var(--text-muted);font-size:0.9rem;margin-top:0.5rem;">Only .csv files are supported</p>
        </div>
        
        <div style="text-align: right;">
            <button type="submit" class="btn">
                Run ETL Pipeline
                <svg style="width:20px;height:20px;margin-left:0.5rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </button>
        </div>
    </form>
</div>
{% endblock %}
